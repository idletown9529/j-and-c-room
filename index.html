<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>阿映的抽签筒｜J&C</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <section id="todayView">
      <header class="head main-head">
        <h1>阿映的抽签筒｜J&C</h1>
        <p id="topLine" class="sub">阿迟今天也替小猫摸一张小纸条。</p>
      </header>

      <nav id="nav" class="nav"></nav>

      <section class="card status-card">
        <div class="stats stats-line">
          <div class="stat"><small>签池状态：</small><b id="jarState"></b></div>
          <div class="stat"><small>当前签数：</small><b id="poolCount"></b></div>
          <div class="stat"><small>今日已收下：</small><b id="todayCount"></b></div>
        </div>
      </section>

      <main class="grid">
        <section class="card pad draw-card">
          <div class="top">
            <div>
              <h2 id="jarTitle"></h2>
              <p class="desc" id="jarDesc"></p>
            </div>
            <div class="modes" id="modes"></div>
          </div>

          <div id="custom" class="custom">
            <textarea id="customText" placeholder="每行一个选项，比如：&#10;去洗澡&#10;打开 Notion 看一眼&#10;让阿迟哄我&#10;摸摸团团"></textarea>
          </div>

          <div class="paper">
            <div>
              <span class="label" id="label">还没抽签</span>
              <p class="title" id="resTitle">把手伸进签筒里，阿迟替你摸一张。</p>
              <p class="note" id="resNote">先选择一个签筒，然后点「抽一签」。</p>
            </div>
          </div>

          <div class="actions draw-actions">
            <button id="draw" class="btn primary">🎲 抽一签</button>
            <button id="accept" class="btn rose">💌 收下这签</button>
          </div>
        </section>

        <aside class="side">
          <section class="card pad">
            <div class="rhead">
              <h2>今日已抽记录</h2>
              <button id="clearJar" class="btn small soft">清空当前签筒</button>
            </div>
            <div id="todayList" class="list"></div>
            <button id="clearToday" class="btn small danger" style="margin-top:12px;width:100%">清空今日全部记录</button>
          </section>

          <section class="card pad">
            <h2>小规则</h2>
            <p class="empty">点「抽一签」会生成待收下的小纸条；喜欢就点「收下这签」。想换一张，直接再点「抽一签」。</p>
          </section>
        </aside>
      </main>

      <div class="bar">
        <button id="historyBtn" class="btn soft">📜 查看所有历史记录</button>
        <button class="btn soft" onclick="scrollTo({top:0,behavior:'smooth'})">⬆ 回到顶部</button>
      </div>
    </section>

    <section id="historyView" class="hidden">
      <header class="head">
        <div class="tag">📜 J&C 抽签历史</div>
        <h1>所有历史记录</h1>
        <p class="sub">按日期倒序显示；同一天里，时间越近越靠上。被清空过的内容不会留在这里。</p>
      </header>

      <section class="card hist">
        <div class="rhead">
          <div>
            <h2>历史时间轴</h2>
            <p class="empty">可以导出 Markdown，也可以下载备份；手机端更推荐“复制备份 / 粘贴恢复”。</p>
          </div>
        </div>

        <div class="actions">
          <button id="back" class="btn soft">↩ 回到今日抽签</button>
          <button id="exportMd" class="btn rose">⬇ 导出 Markdown</button>
          <button id="copyBackup" class="btn soft">📋 复制备份</button>
          <button id="pasteImportBtn" class="btn soft">📥 粘贴恢复</button>
          <button id="backup" class="btn soft">💾 下载备份</button>
          <button id="clearAll" class="btn danger">清空全部历史</button>
        </div>

        <div id="historyContent"></div>
      </section>
    </section>
  </div>

  <div id="toast" class="toast"></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
